<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exemplo de Formulário</title>
</head>
<body>
  <form action="#">
    <label for="nome">Nome:</label>
    <input type="text" name="nome" id="nome" placeholder="Digite seu nome" required>
    <br><br>
    <label for="email">E-mail:</label>
    <input type="email" name="email" id="email" placeholder="exemplo@email.com" required>
    <br><br>
    <label for="senha">Senha:</label>
    <input type="password" name="senha" id="senha" placeholder="Senha com 8 caracteres" minlength="8" required>
    <br><br>
    <label for="telefone">Telefone:</label>
    <input type="tel" name="telefone" id="telefone">
    <br><br>
    <label for="data">Data de Nascimento:</label>
    <input type="date" name="data" id="data">
    <br><br>
    <p>Escolha seu turno:</p>
    <input type="radio" name="turno" id="manha"">
    <label for="manha">Manhã</label>
    <input type="radio" name="turno" id="tarde">
    <label for="tarde">Tarde</label>
    <input type="radio" name="turno" id="noite">
    <label for="noite">Noite</label>
    <br><br>
    <p>Escolha suas disciplinas:</p>
    <input type="checkbox" name="materia" id="quimica" value="quimica">
    <label for="quimica">Química</label>
    <input type="checkbox" name="materia" id="matematica" value="matematica">
    <label for="matematica">Matemática</label>
    <input type="checkbox" name="materia" id="fisica" value="fisica">
    <label for="fisica">Física</label>
  </form>
</body>
</html>
