<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOM</title>
</head>
<body>
  <h1>Estudos DOM</h1>
  <p>Aprendendo a usar o DOM em JavaScript</p>
  <p>Aqui que vai mudar</p>
  <p id="msg">Vamos usar outro <b>seletor</b></p>
  <p class="msg">Vamos usar outro <b>seletor</b></p>

  <label for="nome">Digite seu nome:</label>
  <input type="text" id="nome" name="nome">
  <button onclick="mostrarNome()">Mostrar</button>
  <p id="resultado"></p>
  
  <p id="texto">Vamos usar querySelector</p>
  <p class="texto">Vamos usar querySelector</p>

  <script>
    let paragrafo = document.getElementsByTagName('p')[1]

    paragrafo.innerText = "Texto alterado pelo JavaScript"
    paragrafo.style.color = "blue"

    // document.getElementsByTagName('p')[0].innerText = "Mudou direto"

    // let p2 = document.getElementById('msg')
    let p2 = document.getElementsByClassName('msg')[0]
    // p2.innerText = "Usamos o seletor ID para mudar o texto"
    // p2.innerHTML = "Mudamos o texto usando o seletor <strong>ID</strong>"
    p2.innerHTML = "Mudamos o texto usando o seletor <strong>CLASSE</strong>"

    function mostrarNome() {
      // let nome = document.getElementsByName('nome')[0].value
      const campo = document.querySelector("[name='nome']")
      let nome = campo.value
      document.getElementById('resultado').innerText = `Olá, ${nome}`
    }

    let texto = document.querySelector('#texto')
    texto.innerText = "Usamos o querySelector pelo ID"

    let texto1 = document.querySelector('.texto')
    texto1.innerText = "Usamos o querySelector pela classe"

    let texto2 = document.querySelector('p')
    texto2.innerText = "Usamos o querySelector pela tag"

    let texto3 = document.querySelectorAll('p')
    texto3[4].innerText = "Usamos o querySelector pela tag all"
  </script>
</body>
</html>
